<div class="form-container">
  <form (submit)="onSubmit($event)">
    <input type="text" placeholder="Title" pInputText [formField]="boardGameForm.title" >
    <input type="text" placeholder="Publisher" pInputText [formField]="boardGameForm.publisher" >
    <input type="text" placeholder="Designer" pInputText [formField]="boardGameForm.designer" >
    <input type="text" placeholder="Artist" pInputText [formField]="boardGameForm.artist" >

    <button pButton type="submit"
      [disabled]="!boardGameForm.title().value() || !boardGameForm.designer().value()">
        Save
    </button>
  </form>
</div>
